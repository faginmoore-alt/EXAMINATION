<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate A-Frame Dream House</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
</head>
<body>

<a-scene vr-mode-ui="enabled: true" shadow="type: pcfsoft">

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="houseModel" src="mansion-v2.glb"></a-asset-item>
  </a-assets>

  <!-- Sky (dynamic) -->
  <a-sky id="sky" color="#87CEEB"></a-sky>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="200" height="200" color="#7BC96F" shadow="receive: true"></a-plane>

  <!-- GLB Dream House -->
  <a-entity id="house"
    gltf-model="#houseModel"
    position="0 0 0"
    scale="2 2 2"
    rotation="0 180 0">
  </a-entity>

  <!-- Interior collision walls (walkable inside) -->
  <a-box position="0 1 -2" width="6" height="3" depth="0.2" visible="false"></a-box>
  <a-box position="0 1 2" width="6" height="3" depth="0.2" visible="false"></a-box>
  <a-box position="-3 1 0" width="0.2" height="3" depth="6" visible="false"></a-box>
  <a-box position="3 1 0" width="0.2" height="3" depth="6" visible="false"></a-box>

  <!-- Lighting (day/night controlled) -->
  <a-light id="sun" type="directional" intensity="1.2" position="5 10 7"></a-light>
  <a-light id="ambient" type="ambient" intensity="0.5"></a-light>

  <!-- Interactive Light -->
  <a-sphere id="lamp" position="0 3 0" radius="0.3" color="#FFD700"
    event-set__on="_event: click; material.color: #222"
    event-set__off="_event: click; material.color: #FFD700">
  </a-sphere>

  <!-- Interactive Door -->
  <a-box id="door" position="0 1 3" width="1" height="2" depth="0.1" color="#8B4513"
    animation__open="property: rotation; to: 0 90 0; startEvents: click; dur: 800">
  </a-box>

  <!-- Original Villa (blended behind) -->
  <a-box position="10 2 0" width="6" height="4" depth="6" color="#e0e0e0"></a-box>

  <!-- Dream elements -->
  <a-sphere position="3 5 -5" radius="0.5" color="#FFD700"
    animation="property: position; dir: alternate; dur: 2000; loop: true; to: 3 7 -5"></a-sphere>

  <!-- Camera Rig (walk + VR ready) -->
  <a-entity id="rig" movement-controls="speed: 0.2" position="0 5 70">
    <a-entity camera look-controls wasd-controls>
      <a-cursor></a-cursor>
    </a-entity>
  </a-entity>

</a-scene>

<script>
// Day/Night Cycle
let isDay = true;
setInterval(() => {
  const sky = document.getElementById('sky');
  const sun = document.getElementById('sun');

  if (isDay) {
    sky.setAttribute('color', '#0b1d3a');
    sun.setAttribute('intensity', 0.2);
  } else {
    sky.setAttribute('color', '#87CEEB');
    sun.setAttribute('intensity', 1.2);
  }

  isDay = !isDay;
}, 8000);
</script>

</body>
</html>
